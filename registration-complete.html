<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Complete- Monday</title>
    <meta property="og:title" content="Home - Monday" />
    <meta property="twitter:title" content="Home - Monday" />
    <meta name="description" content="Monday, the freelance marketplace for all your needs" />
    <meta property="og:description" content="Monday, the freelance marketplace for all your needs" />
    <meta property="twitter:description" content="Monday, the freelance marketplace for all your needs" />
    <link href="/assets/css/index.0fcabdd2790f60f408b7.css" rel="stylesheet" />

    <style>
      /* Only for this preview page */
      body {
        padding: 24px;
      }

      .page-btns {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .page-btns-item {
        border: none;
        outline: none;
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 4px;
        background: #5a6f9d;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      /* CSS */
    </style>
  </head>

  <body>
    <button class="page-btns-item" data-target="complete-modal">Open create profile modal</button>

    <div class="profile_modal active" id="complete-modal">
      <div class="profile_modal_content">
        <div class="profile_modal_head">
          <div class="profile_modal_logo">MONDAY</div>

          <button class="profile_modal_close" data-target="complete-modal" type="button">
            <span></span>
            <span></span>
          </button>
        </div>

        <div class="profile_modal_body">
          <h3>Complete Your Profile</h3>

          <p class="profile_modal_subtitle">Tell us a bit about yourself to get started on Monday.</p>

          <label class="profile_upload_photo">
            <input class="profile_upload_input" type="file" accept="image/png,image/jpeg,image/jpg" />

            <svg class="profile_upload_icon">
              <use href="/img/sprite.svg#document-upload"></use>
            </svg>

            <span class="profile_upload_title">Upload Photo</span>
            <span class="profile_upload_text">(Optional)</span>
          </label>

          <div class="profile_upload_rules">
            <div class="profile_upload_rules">
              <p><span>•</span> Image format: <strong>PNG, JPG, JPEG</strong></p>
              <p><span>•</span> The image size must be at least <strong>200x200 pixels.</strong></p>
            </div>
          </div>

          <div class="profile_modal_input_wrap">
            <input type="text" placeholder="Enter your nickname" class="profile_modal_input" />
            <input type="text" placeholder="Enter your username (visible for all)*" class="profile_modal_input" />

            <div class="profile_password_field">
              <input type="password" placeholder="Password*" class="profile_modal_input" />
              <button type="button" class="profile_password_eye">
                <svg class="profile_sprite_icon">
                  <use href="/img/sprite.svg#eye"></use>
                </svg>
              </button>
            </div>

            <div class="profile_password_field">
              <input type="password" placeholder="Repeat Password*" class="profile_modal_input" />
              <button type="button" class="profile_password_eye">
                <svg class="profile_sprite_icon">
                  <use href="/img/sprite.svg#eye"></use>
                </svg>
              </button>
            </div>
          </div>

          <button class="profile_modal_primary" type="button">Create My Account</button>

          <div class="profile_modal_notice profile_modal_notice_center">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M8.00033 1.33268C4.33366 1.33268 1.33366 4.33268 1.33366 7.99935C1.33366 11.666 4.33366 14.666 8.00033 14.666C11.667 14.666 14.667 11.666 14.667 7.99935C14.667 4.33268 11.667 1.33268 8.00033 1.33268Z"
                stroke="#9CA5B3"
                stroke-width="1.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path d="M8 10.666L8 7.33268" stroke="#9CA5B3" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M8.00391 5.33399L7.99792 5.33399" stroke="#9CA5B3" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <p>You can update your profile details anytime in setting.</p>
          </div>

          <p class="profile_modal_terms">
            I agree with the <a href="#">Terms & Conditions</a><br />
            and <a href="#">The contract offer.</a>
          </p>
        </div>
      </div>
    </div>

    <style>
      .profile_modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(32, 32, 32, 0.75);
        display: flex;
        flex-direction: column;
        padding: 16px;
        opacity: 0;
        visibility: hidden;
        overflow: hidden auto;
        transition: 250ms ease;
        transition-property: opacity, visibility;
        font-family: inherit;
      }

      .profile_modal.active {
        opacity: 1;
        visibility: visible;
      }

      .profile_modal_content {
        width: 100%;
        max-width: 420px;
        border-radius: 36px;
        background: #fff;
        padding: 20px;
        margin: auto;
      }

      .profile_modal_head {
        position: relative;
        display: flex;
        justify-content: center;
        margin: 10px 0 20px;
      }

      .profile_modal_logo {
        color: #b7c3d6;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        border-bottom: 1px solid #b7c3d6;
        padding-bottom: 4px;
      }

      .profile_modal_close {
        position: absolute;
        right: 0;
        top: -12px;
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: #fafafc;
        border: none;
        cursor: pointer;
        transition: background 150ms ease;
      }

      .profile_modal_close:hover {
        background: #efefef;
      }

      .profile_modal_close span {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 16px;
        height: 2px;
        border-radius: 10px;
        background: #9ca5b3;
      }

      .profile_modal_close span:first-child {
        transform: translate(-50%, -50%) rotate(45deg);
      }

      .profile_modal_close span:last-child {
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      .profile_modal_body {
        text-align: center;
      }

      .profile_modal_body h3 {
        margin: 0 0 15px;
        color: #202020;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .profile_modal_subtitle {
        margin: 0 auto 20px;
        color: #9ca5b3;
        max-width: 300px;
        font-size: 14px;
        font-weight: 400;
        line-height: 1.3;
        letter-spacing: -0.01em;
      }

      .profile_modal_notice {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin: 12px 0 16px;
        text-align: left;
      }

      .profile_modal_notice p {
        margin: 0;
        color: #9ca5b3;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.2;
      }

      .profile_modal_terms {
        margin: 0;
        color: #9ca5b3;
        font-size: 12px;
        font-weight: 400;
        line-height: 1.3;
      }

      .profile_modal_terms a {
        color: #9ca5b3;
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 2px;
        transition: 0.3s;
      }

      .profile_modal_terms a:hover {
        color: #4790ff;
      }

      .profile_modal_primary {
        width: 100%;
        height: 50px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(90deg, #6ab8ff 0%, #b8ddff 100%);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      .profile_modal_primary:hover {
        box-shadow: inset 0 0 0 1px #4790ff;
        background: #fff;
        color: #4790ff;
      }

      .profile_modal_notice_center {
        justify-content: center;
        align-items: center;
        margin: 12px 0 20px;
        text-align: center;
      }

      .profile_modal_notice_center p {
        font-weight: 600;
      }

      .profile_modal_input_wrap {
        margin-bottom: 20px;
      }

      .profile_modal_input {
        width: 100%;
        height: 50px;
        border-radius: 14px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: #fff;
        padding: 0 16px;
        outline: none;
        color: #202020;
        font-size: 14px;
        font-weight: 400;
        transition: 150ms ease;
      }

      .profile_modal_input::placeholder {
        color: #9ca5b3;
      }

      .profile_modal_input:focus {
        border-color: #4790ff;
      }

      .profile_upload_photo {
        width: 112px;
        height: 112px;
        margin: 0 auto 14px;
        border-radius: 18px;
        border: 1px dashed #b7c3d6;
        background: #fafafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: pointer;
        transition: 0.3s;
      }

      .profile_upload_photo:hover {
        border-color: #4790ff;
        background: #edf4ff;
      }

      .profile_upload_icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        min-width: 24px;
        min-height: 24px;
        fill: none;
        stroke: #575e6a;
      }

      .profile_upload_title {
        color: #575e6a;
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
      }

      .profile_upload_text {
        color: #9ca5b3;
        font-size: 12px;
        font-weight: 400;
        line-height: 1;
      }

      .profile_upload_rules {
        margin: 0 0 16px;
        color: #9CA5B3;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.4;
      }

      .profile_upload_rules p {
        margin: 0;
      }

      .profile_upload_rules p + p {
        margin-top: 4px;
      }

      .profile_upload_rules strong {
        color: #202020;
        font-weight: 700;
      }

      .profile_modal_input_wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .profile_password_field {
        position: relative;
      }

      .profile_password_field .profile_modal_input {
        padding-right: 44px;
      }

      .profile_sprite_icon {
        display: block;
        width: 14px;
        height: 14px;
        min-width: 14px;
        min-height: 14px;
        fill: none;
        stroke: #9ca5b3;
      }

      .profile_upload_photo:hover .profile_upload_icon,
      .profile_password_eye:hover .profile_sprite_icon {
        stroke: #4790ff;
      }

      .profile_password_eye {
        position: absolute;
        right: 20px;
        top: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .profile_upload_input {
        display: none;
      }

      .profile_upload_photo:hover .profile_upload_icon,
      .profile_upload_photo:hover .profile_upload_title,
      .profile_upload_photo:hover .profile_upload_text {
        color: #4790ff;
        stroke: #4790ff;
      }

      .profile_upload_icon,
      .profile_upload_title,
      .profile_upload_text {
        transition: 0.3s;
      }

      .profile_upload_rules p {
        margin: 0;
        display: flex;
        justify-content: center;
        gap: 6px;
      }
    </style>

    <script>
      document.querySelectorAll("[data-target]").forEach((element) => {
        const targetModal = document.getElementById(element.dataset.target);

        if (!targetModal) return;

        element.addEventListener("click", () => {
          targetModal.classList.toggle("active");
        });
      });
    </script>

    <script>
      document.querySelectorAll(".profile_password_eye").forEach((button) => {
        button.addEventListener("click", () => {
          const field = button.closest(".profile_password_field");
          const input = field.querySelector("input");
          const use = button.querySelector("use");

          const isPassword = input.type === "password";

          input.type = isPassword ? "text" : "password";
          use.setAttribute("href", isPassword ? "/img/sprite.svg#eye-slash" : "/img/sprite.svg#eye");
        });
      });
    </script>
  </body>
</html>
